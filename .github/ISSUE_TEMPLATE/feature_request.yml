name: Feature request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: textarea
    id: description
    attributes:
      label: What would you like?
      description: Describe the feature and why it would be useful.
    validations:
      required: true
  - type: textarea
    id: example
    attributes:
      label: Example usage
      description: How would this look from the CLI or library? Paste an example command or code snippet.
      render: sh
