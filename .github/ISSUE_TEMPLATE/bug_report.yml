name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: input
    id: url
    attributes:
      label: URL that caused the issue
      placeholder: https://example.com/page
    validations:
      required: false
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug. What did you expect vs what actually happened?
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Actual output
      description: Paste the CLI output or the markdown result.
      render: markdown
  - type: input
    id: version
    attributes:
      label: rdrr version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "22.0.0"
